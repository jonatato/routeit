<?xml version="1.0" encoding="utf-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="routeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa55f7"/>
      <stop offset="100%" stop-color="#5b2dd8"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect x="56" y="56" width="400" height="400" rx="120" fill="url(#routeGradient)"/>

  <!-- Ruta conceptual -->
  <path d="M210 190
           C210 150, 310 150, 310 210
           C310 250, 250 250, 230 280
           C210 310, 260 340, 310 360"
        fill="none"
        stroke="white"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Punto inicial tipo pin (inicio) -->
  <circle cx="210" cy="190" r="20" fill="white"/>
  <circle cx="210" cy="190" r="9" fill="#aa55f7"/>

  <!-- Punto final tipo pin (fin) -->
  <circle cx="310" cy="360" r="22" fill="white"/>
  <circle cx="310" cy="360" r="10" fill="#aa55f7"/>
</svg>
